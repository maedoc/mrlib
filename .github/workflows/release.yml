name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            target: linux-amd64
            binary_name: mrlib-linux-amd64
          - os: linux
            arch: arm64
            target: linux-arm64
            binary_name: mrlib-linux-arm64
          - os: darwin
            arch: amd64
            target: darwin-amd64
            binary_name: mrlib-darwin-amd64
          - os: darwin
            arch: arm64
            target: darwin-arm64
            binary_name: mrlib-darwin-arm64
          - os: windows
            arch: amd64
            target: windows-amd64
            binary_name: mrlib-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: |
          cd go
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -ldflags="-s -w" -o ../${{ matrix.binary_name }} ./cmd/main.go

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mrlib-${{ matrix.target }}
          path: ${{ matrix.binary_name }}
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: mrlib-*

      - name: List artifacts
        run: ls -R artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## mrlib ${{ github.ref_name }}
            
            Mistral AI Libraries CLI with two-way file synchronization.
            
            ### Assets
            - **Linux (x86_64)**: `mrlib-linux-amd64`
            - **Linux (ARM64)**: `mrlib-linux-arm64`
            - **macOS (Intel)**: `mrlib-darwin-amd64`
            - **macOS (Apple Silicon)**: `mrlib-darwin-arm64`
            - **Windows (x86_64)**: `mrlib-windows-amd64.exe`
          files: |
            artifacts/mrlib-linux-amd64/mrlib-linux-amd64
            artifacts/mrlib-linux-arm64/mrlib-linux-arm64
            artifacts/mrlib-darwin-amd64/mrlib-darwin-amd64
            artifacts/mrlib-darwin-arm64/mrlib-darwin-arm64
            artifacts/mrlib-windows-amd64/mrlib-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
